# ---------- 基础 ----------
set -g default-terminal "tmux-256color"
set -g mouse on
set -g history-limit 100000
set -g focus-events on

# 更快响应
set -sg escape-time 0

# ---------- 前缀键 ----------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ---------- 分屏 ----------
bind | split-window -h
bind - split-window -v

# 使用 vim 键位移动
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# 调整 pane 大小
bind -r H resize-pane -L 1
bind -r J resize-pane -D 1
bind -r K resize-pane -U 1
bind -r L resize-pane -R 1

# ---------- 窗口 ----------
bind c new-window
bind n next-window
bind p previous-window

# 使用 Alt + 数字切换窗口
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3

# ---------- 复制模式 ----------
setw -g mode-keys vi

bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel


# ---------- 状态栏 ----------
set -g status-position bottom
set -g status-interval 5
# ===== 基础状态栏 =====
set -g status-style bg=#fbf1c7,fg=#3c3836
# ===== 左侧（session）=====
set -g status-left-length 40
set -g status-left "#[fg=#fbf1c7,bg=#d79921,bold] #S #[fg=#d79921,bg=#fbf1c7,nobold]"
# ===== 右侧（时间）=====
set -g status-right-length 50
set -g status-right "#[fg=#fbf1c7,bg=#458588] %Y-%m-%d %H:%M #[fg=#458588,bg=#fbf1c7]"
# ===== 窗口标签 =====
# 普通窗口
set -g window-status-format "#[fg=#7c6f64,bg=#ebdbb2] #I:#W #[default]"
# 当前窗口
set -g window-status-current-format "#[fg=#fbf1c7,bg=#b16286,bold] #I:#W #[fg=#b16286,bg=#fbf1c7,nobold]"
# ===== 分隔线 =====
set -g window-status-separator ""
# ===== Pane 边框 =====
set -g pane-border-style fg=#d5c4a1
set -g pane-active-border-style fg=#b16286
# ===== 消息提示 =====
set -g message-style bg=#ebdbb2,fg=#3c3836
# ===== 命令行 =====
set -g message-command-style bg=#d79921,fg=#fbf1c7


# ---------- 插件 ----------
set -g @plugin 'tmux-plugins/tpm'

# 必备
set -g @plugin 'tmux-plugins/tmux-sensible'

# 状态栏增强
# set -g @plugin 'tmux-plugins/tmux-powerline'
# 或（推荐更现代）
#set -g @plugin 'catppuccin/tmux'

# 自动恢复 session
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# 快速 yank 到系统剪贴板
set -g @plugin 'tmux-plugins/tmux-yank'

# ---------- resurrect 配置 ----------
# set -g @resurrect-capture-pane-contents 'on'
# set -g @continuum-restore 'on'

# ---------- 初始化 TPM ----------
run '~/.config/tmux/plugins/tpm/tpm'
