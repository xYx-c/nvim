# ---------- 基础 ----------
set -g default-terminal "tmux-256color"
set -as terminal-features ',*:RGB'
set -as terminal-features ',*:clipboard'
set -g mouse on
set -g xterm-keys on
set -g set-clipboard on

unbind -n WheelUpPane
unbind -n WheelDownPane

bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

set -g history-limit 100000
set -g focus-events on

# 更快响应
set -sg escape-time 0

# ---------- 前缀键 ----------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ---------- 分屏 ----------
bind | split-window -h
bind - split-window -v


# 使用 vim 键位移动
bind j select-pane -D
bind h select-pane -L
bind k select-pane -U
bind l select-pane -R

# 调整 pane 大小
bind -r H resize-pane -L 1
bind -r J resize-pane -D 1
bind -r K resize-pane -U 1
bind -r L resize-pane -R 1

# ---------- 窗口 ----------
set -g base-index 1
bind c new-window
bind n next-window
bind p previous-window
# bind x kill-pane
# bind & kill-window

# Use Alt + number to switch windows
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# ---------- 复制模式 ----------
setw -g mode-keys vi

bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel


# ---------- 状态栏 ----------
set -g status-position bottom
set -g status-interval 1
# ===== 基础状态栏 =====
set -g status-style bg=#ebdbb2,fg=#3c3836
# ===== 左侧（session）=====
set -g status-left-length 40
set -g status-left "#[fg=#fbf1c7,bg=#d79921,bold] #S #[fg=#d79921,bg=#f2e5bc,nobold]"
# ===== 右侧（时间）=====
set -g status-right-length 50
set -g status-right "#[fg=#fbf1c7,bg=#458588] %Y-%m-%d %H:%M #[fg=#458588,bg=#f2e5bc]"
# ===== 窗口标签 =====
# 普通窗口
set -g window-status-format "#[fg=#7c6f64,bg=#ebdbb2] #I:#W #[default]"
# 当前窗口
set -g window-status-current-format "#[fg=#fbf1c7,bg=#b16286,bold] #I:#W #[fg=#b16286,bg=#f2e5bc,nobold]"
# ===== 分隔线 =====
set -g window-status-separator ""
# ===== Pane 边框 =====
set -g pane-border-style fg=#d5c4a1
set -g pane-active-border-style fg=#b16286
# ===== 消息提示 =====
set -g message-style bg=#ebdbb2,fg=#3c3836
# ===== 命令行 =====
set -g message-command-style bg=#d79921,fg=#fbf1c7

# ---------- hook：当前 pane 是 nvim，或当前 window 已被 nvim 接管时隐藏 tmux 状态栏 ----------
set-hook -g client-attached 'if-shell -F "#{||:#{==:#{@nvim_lualine},1},#{||:#{==:#{pane_current_command},nvim},#{==:#{pane_current_command},vim}}}" "set-option -q status off" "set-option -q status on"'
set-hook -g client-session-changed 'if-shell -F "#{||:#{==:#{@nvim_lualine},1},#{||:#{==:#{pane_current_command},nvim},#{==:#{pane_current_command},vim}}}" "set-option -q status off" "set-option -q status on"'
set-hook -g pane-focus-in 'if-shell -F "#{||:#{==:#{@nvim_lualine},1},#{||:#{==:#{pane_current_command},nvim},#{==:#{pane_current_command},vim}}}" "set-option -q status off" "set-option -q status on"'
set-hook -g after-select-window 'if-shell -F "#{||:#{==:#{@nvim_lualine},1},#{||:#{==:#{pane_current_command},nvim},#{==:#{pane_current_command},vim}}}" "set-option -q status off" "set-option -q status on"'
set-hook -g after-new-window 'set-option -q status on'
set-hook -g after-split-window 'if-shell -F "#{||:#{==:#{@nvim_lualine},1},#{||:#{==:#{pane_current_command},nvim},#{==:#{pane_current_command},vim}}}" "set-option -q status off" "set-option -q status on"'
set-hook -g pane-exited 'if-shell -F "#{||:#{==:#{@nvim_lualine},1},#{||:#{==:#{pane_current_command},nvim},#{==:#{pane_current_command},vim}}}" "set-option -q status off" "set-option -q status on"'

# ---------- 插件 ----------
set -g @plugin 'tmux-plugins/tpm'

# 必备
set -g @plugin 'tmux-plugins/tmux-sensible'

# 状态栏增强
# set -g @plugin 'tmux-plugins/tmux-powerline'
# 或（推荐更现代）
#set -g @plugin 'catppuccin/tmux'

# 自动恢复 session
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# 快速 yank 到系统剪贴板
set -g @plugin 'tmux-plugins/tmux-yank'

# ---------- resurrect 配置 ----------
# set -g @resurrect-capture-pane-contents 'on'
# set -g @continuum-restore 'on'

# ---------- 初始化 TPM ----------
run '~/.config/tmux/plugins/tpm/tpm'
